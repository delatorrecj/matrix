[project]
name = "matrix-kernel"
version = "0.1.0"
description = "MATRIX unified simulation kernel + five glass-box impact modules"
requires-python = ">=3.12"
# Pin/verify exact versions at install (build-matrix.md §3). SUMO itself runs from
# its Docker image at runtime; these are the Python-side deps.
dependencies = [
    "eclipse-sumo",   # provides sumolib + TraCI. Verify current at install.
    "osmnx",
    "numpy",
    "pandas",
    "geopandas",
    "shapely",
    "xgboost",
    "redis",
    # Persona pool (Gemini 3.1 Flash-Lite). VERIFY call shape + model IDs against
    # ai.google.dev before use -- never Gemini 1.5/2.0 (build-matrix.md §3).
    "google-genai",
]

[project.optional-dependencies]
dev = ["pytest"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["matrix_kernel"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
