app = "matrix-api-backend"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile.api"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2

[env]
  PORT = "8000"
  MATRIX_REDIS_URL = "redis://matrix-redis.internal:6379"
